[pytest]
# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers - define custom test markers
#
# Usage guidelines:
#   @network        — requires live internet; skip with: pytest --offline
#                     or env: TEST_OFFLINE=true
#   @requires_sudo  — needs elevated privileges (comcast/pfctl); skip with:
#                     pytest --no-sudo  or env: TEST_NO_SUDO=true
#   @security       — can combine with @network (live cert checks) or run
#                     offline (hash/crypto tests); never combine with @slow
#   @performance    — always combine with @network (measures real latency);
#                     thresholds: TLS < 1000ms, DNS < 500ms, connection < 2000ms
#   @slow           — takes > 1s; exclude for fast feedback: pytest -m "not slow"
#   @protocol       — offline-safe low-level socket/packet tests
#   @integration    — spans multiple components; may need @network
#   @smoke          — critical-path tests; run first in CI pipelines
#   @regression     — tied to a specific bug fix; add ticket reference in docstring
#
markers =
    network: tests requiring live network connectivity (skip with --offline)
    skip_if_no_network: skip gracefully if network is not available
    security: SSL/TLS, hashing, and privacy-focused tests
    protocol: low-level socket and packet-format tests (offline-safe)
    performance: latency and throughput benchmarks (combine with @network)
    slow: tests taking > 1 second (exclude with -m "not slow")
    integration: multi-component tests spanning utils + test files
    smoke: critical-path tests for CI fast-fail pipelines
    regression: bug regression tests (reference ticket ID in docstring)
    requires_sudo: tests needing sudo privileges for network conditioning (skip with --no-sudo)

# Output and reporting options
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes
    --disable-warnings
    # Uncomment to generate reports:
    # --junit-xml=reports/junit/results.xml
    # --html=reports/html/report.html
    # --self-contained-html
    # --cov=.
    # --cov-report=html:reports/coverage
    # --cov-report=term-missing

# Test discovery paths
testpaths = tests

# Minimum Python version
minversion = 3.8

# Console output options
console_output_style = progress

# Log settings
log_cli = false
log_cli_level = INFO
log_file = reports/pytest.log
log_file_level = DEBUG

# Timeout for all tests (requires pytest-timeout)
# timeout = 300

# Parallel execution (requires pytest-xdist)
# addopts = -n auto
