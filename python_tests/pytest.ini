[pytest]
# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers - define custom test markers
markers =
    network: tests requiring network connectivity
    skip_if_no_network: skip tests if network is not available
    security: security-focused tests
    protocol: protocol-level tests
    performance: performance benchmarks
    slow: slow-running tests (> 1s)
    integration: integration tests requiring multiple components
    smoke: smoke tests for critical functionality
    regression: regression tests for bug fixes

# Output and reporting options
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes
    --disable-warnings
    # Uncomment to generate reports:
    # --junit-xml=reports/junit/results.xml
    # --html=reports/html/report.html
    # --self-contained-html
    # --cov=.
    # --cov-report=html:reports/coverage
    # --cov-report=term-missing

# Test discovery paths
testpaths = tests

# Minimum Python version
minversion = 3.8

# Console output options
console_output_style = progress

# Log settings
log_cli = false
log_cli_level = INFO
log_file = reports/pytest.log
log_file_level = DEBUG

# Timeout for all tests (requires pytest-timeout)
# timeout = 300

# Parallel execution (requires pytest-xdist)
# addopts = -n auto
